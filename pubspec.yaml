name: photoid
description: "Free passport & ID photo app. 100% on-device."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  google_mlkit_face_detection: ^0.13.0
  google_mlkit_selfie_segmentation: ^0.10.1
  image: ^4.5.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
